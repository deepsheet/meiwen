<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>过得很好</title>
</head>
<body style="margin: 0; padding: 20px; font-family: PingFang SC, Microsoft YaHei, SimHei, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #f0f4f8 100%); min-height: 100vh; box-sizing: border-box;">

    <!-- 主标题区域 -->
    <div style="max-width: 800px; margin: 40px auto 60px; text-align: center;">
        <h1 style="font-size: 3.5rem; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2;">✨ 过得很好</h1>
        <div style="height: 6px; width: 120px; background: linear-gradient(to right, #667eea, #764ba2); margin: 20px auto; border-radius: 3px;"></div>
    </div>

    <!-- 文章内容卡片 -->
    <div style="max-width: 720px; margin: 0 auto 40px; background: white; border-radius: 24px; padding: 50px 40px; box-shadow: 0 20px 60px rgba(102, 126, 234, 0.1); position: relative; overflow: hidden;">
        <!-- 装饰性背景元素 -->
        <div style="position: absolute; top: -100px; right: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0) 70%); border-radius: 50%; z-index: 0;"></div>
        <div style="position: absolute; bottom: -80px; left: -80px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(118, 75, 162, 0.05) 0%, rgba(118, 75, 162, 0) 70%); border-radius: 50%; z-index: 0;"></div>

        <!-- 核心内容区域 -->
        <div style="position: relative; z-index: 1;">
            <!-- 引言式段落 -->
            <div style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.08) 100%); border-left: 6px solid #667eea; padding: 30px; border-radius: 0 16px 16px 0; margin-bottom: 40px;">
                <p style="margin: 0; font-size: 1.8rem; line-height: 1.6; color: #333; font-weight: 400; text-align: center;">
                    我想表达最近过得很好
                </p>
            </div>

            <!-- 情感状态高亮展示 -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 40px;">
                <div style="background: linear-gradient(135deg, #f0f7ff 0%, #e6f0ff 100%); border-radius: 20px; padding: 25px; text-align: center; border: 2px dashed #667eea;">
                    <div style="font-size: 3rem; margin-bottom: 15px;">😊</div>
                    <div style="font-size: 1.1rem; color: #555; line-height: 1.5;">
                        我想表达最近过得很好
                    </div>
                </div>
            </div>

            <!-- 纯文本完整保留 -->
            <div style="margin-top: 50px; padding-top: 30px; border-top: 1px solid #eee;">
                <div style="font-size: 1.1rem; line-height: 1.8; color: #444; background: #f9f9f9; padding: 25px; border-radius: 16px; white-space: pre-wrap; font-family: inherit;">
我想表达最近过得很好
                </div>
            </div>
        </div>
    </div>

    <!-- 页面底部标识 - 固定模板 -->
    <div style="text-align: center; margin-top: 60px; padding: 30px 0; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); border-radius: 16px;">
        <a href="http://p.isheet.net/beauty_html" target="_blank" style="text-decoration: none; color: #667eea; font-size: 16px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease;" onmouseover="this.style.color='#764ba2'; this.style.transform='scale(1.05)'" onmouseout="this.style.color='#667eea'; this.style.transform='scale(1)'">
            🎨 <span>powered by 深表美文</span>
        </a>
    </div>

</body>
</html>
