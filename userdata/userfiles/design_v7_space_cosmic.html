<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026爆火AI"小龙虾"：真正能干活的数字员工</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #eee;
      line-height: 1.8;
    }
    
    /* 星空背景 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    }
    
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 40px;
      position: relative;
      z-index: 1;
    }
    
    /* 太空风格标题 */
    .space-header {
      text-align: center;
      margin-bottom: 100px;
    }
    
    h1 {
      font-size: clamp(3em, 7vw, 5em);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
    }
    
    .orbit-ring {
      width: 200px;
      height: 200px;
      border: 3px solid rgba(102, 126, 234, 0.3);
      border-radius: 50%;
      margin: 40px auto;
      position: relative;
      animation: rotate 20s linear infinite;
    }
    
    .orbit-ring::before {
      content: '🦞';
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3em;
      animation: counterRotate 20s linear infinite;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes counterRotate {
      from { transform: translateX(-50%) rotate(0deg); }
      to { transform: translateX(-50%) rotate(-360deg); }
    }
    
    /* 卡片布局 */
    .content-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 35px;
      margin-bottom: 80px;
    }
    
    .cosmic-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 45px;
      transition: all 0.5s ease;
      position: relative;
      overflow: hidden;
    }
    
    .cosmic-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(102, 126, 234, 0.3), transparent);
      animation: cardGlow 8s linear infinite;
      opacity: 0;
      transition: opacity 0.5s;
    }
    
    .cosmic-card:hover::before {
      opacity: 1;
    }
    
    @keyframes cardGlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .cosmic-card:hover {
      transform: translateY(-10px) scale(1.03);
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
    }
    
    .card-content {
      position: relative;
      z-index: 1;
    }
    
    .icon-circle {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5em;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    
    .card-title {
      font-size: 1.8em;
      font-weight: 700;
      margin-bottom: 20px;
      color: white;
    }
    
    .card-text {
      font-size: 1.1em;
      line-height: 1.9;
      color: rgba(255, 255, 255, 0.8);
    }
    
    .highlight-word {
      color: #667eea;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
    }
    
    /* 中心引用 */
    .center-quote {
      text-align: center;
      padding: 60px;
      margin: 80px 0;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
      border-radius: 30px;
      border: 2px solid rgba(102, 126, 234, 0.3);
      position: relative;
    }
    
    .quote-text-large {
      font-size: 2.2em;
      font-weight: 900;
      line-height: 1.5;
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* 底部 */
    footer {
      text-align: center;
      margin-top: 100px;
      padding-top: 60px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 20px 45px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.2em;
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
      transition: all 0.4s;
    }
    
    .footer-link:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 25px 60px rgba(102, 126, 234, 0.6);
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .container {
        padding: 60px 25px;
      }
      
      .content-cards {
        grid-template-columns: 1fr;
      }
      
      .orbit-ring {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  
  <div class="container">
    <header class="space-header">
      <h1>AI小龙虾</h1>
      <div class="orbit-ring"></div>
    </header>

    <section class="content-cards">
      <div class="cosmic-card">
        <div class="card-content">
          <div class="icon-circle">🚀</div>
          <h2 class="card-title">现象级爆火</h2>
          <p class="card-text">
            2026年开春，<span class="highlight-word">OpenClaw</span>彻底刷屏科技圈。从极客玩具到全民"养虾"热潮，完成现象级进化。
          </p>
        </div>
      </div>

      <div class="cosmic-card">
        <div class="card-content">
          <div class="icon-circle">🧠</div>
          <h2 class="card-title">智能体本质</h2>
          <p class="card-text">
            非聊天机器人，而是<span class="highlight-word">开源AI智能体（Agent）</span>。如"贾维斯"般直接操作系统，执行各类任务。
          </p>
        </div>
      </div>

      <div class="cosmic-card">
        <div class="card-content">
          <div class="icon-circle">⚡</div>
          <h2 class="card-title">核心价值</h2>
          <p class="card-text">
            打破"只说不做"局限。<span class="highlight-word">7x24小时数字员工</span>，极大提升效率，人人可用。
          </p>
        </div>
      </div>

      <div class="cosmic-card">
        <div class="card-content">
          <div class="icon-circle">⚠️</div>
          <h2 class="card-title">安全提醒</h2>
          <p class="card-text">
            高权限需注意<span class="highlight-word">数据安全</span>，建议隔离环境部署。生产力革命才刚刚开始。
          </p>
        </div>
      </div>
    </section>

    <div class="center-quote">
      <p class="quote-text-large">
        "真正能执行任务的AI"
      </p>
    </div>

    <footer>
      <a href="/" class="footer-link">✨ powered by 深表美文</a>
    </footer>
  </div>

  <script>
    // 生成星星
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
