<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026爆火AI"小龙虾"：真正能干活的数字员工</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      color: #2d3436;
      line-height: 1.8;
    }
    
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 40px;
    }
    
    /* 柔和标题 */
    .soft-header {
      text-align: center;
      margin-bottom: 80px;
    }
    
    h1 {
      font-size: clamp(3em, 7vw, 5em);
      font-weight: 300;
      line-height: 1.3;
      color: #6c5ce7;
      margin-bottom: 20px;
      letter-spacing: 3px;
    }
    
    .header-accent {
      width: 100px;
      height: 4px;
      background: linear-gradient(90deg, #a8edea, #fed6e3);
      margin: 0 auto;
      border-radius: 2px;
    }
    
    /* 圆角卡片网格 */
    .rounded-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 35px;
      margin-bottom: 80px;
    }
    
    .round-card {
      background: white;
      border-radius: 30px;
      padding: 45px;
      box-shadow: 0 10px 40px rgba(108, 92, 231, 0.1);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .round-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(168, 237, 234, 0.1), rgba(254, 214, 227, 0.1));
      opacity: 0;
      transition: opacity 0.4s;
    }
    
    .round-card:hover::before {
      opacity: 1;
    }
    
    .round-card:hover {
      transform: translateY(-12px) rotate(2deg);
      box-shadow: 0 20px 60px rgba(108, 92, 231, 0.2);
    }
    
    .card-emoji-circle {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8em;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(168, 237, 234, 0.3);
    }
    
    .card-heading {
      font-size: 1.9em;
      font-weight: 700;
      margin-bottom: 20px;
      color: #6c5ce7;
    }
    
    .card-body-text {
      font-size: 1.1em;
      line-height: 2;
      color: #636e72;
    }
    
    .soft-highlight {
      background: linear-gradient(120deg, #a8edea 0%, #fed6e3 100%);
      padding: 3px 10px;
      border-radius: 8px;
      font-weight: 700;
      color: #6c5ce7;
    }
    
    /* 引用框 */
    .pastel-quote {
      background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
      border-left: 6px solid #6c5ce7;
      padding: 50px;
      margin: 60px 0;
      border-radius: 0 20px 20px 0;
      box-shadow: 0 10px 40px rgba(108, 92, 231, 0.1);
    }
    
    .quote-main-text {
      font-size: 2em;
      font-weight: 700;
      color: #6c5ce7;
      line-height: 1.6;
    }
    
    /* 底部 */
    footer {
      text-align: center;
      margin-top: 80px;
      padding-top: 50px;
    }
    
    .pill-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 20px 50px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.2em;
      box-shadow: 0 10px 30px rgba(108, 92, 231, 0.3);
      transition: all 0.4s;
    }
    
    .pill-button:hover {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 20px 50px rgba(108, 92, 231, 0.5);
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .container {
        padding: 60px 25px;
      }
      
      .rounded-grid {
        grid-template-columns: 1fr;
      }
      
      .pastel-quote {
        padding: 40px 30px;
      }
      
      .quote-main-text {
        font-size: 1.6em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="soft-header">
      <h1>🦞 AI小龙虾</h1>
      <div class="header-accent"></div>
    </header>

    <section class="rounded-grid">
      <article class="round-card">
        <div class="card-emoji-circle">🚀</div>
        <h2 class="card-heading">现象级爆火</h2>
        <p class="card-body-text">
          2026年开春，<span class="soft-highlight">OpenClaw</span>彻底刷屏科技圈。从极客玩具到全民"养虾"热潮，完成现象级进化。
        </p>
      </article>

      <article class="round-card">
        <div class="card-emoji-circle">🧠</div>
        <h2 class="card-heading">智能体本质</h2>
        <p class="card-body-text">
          非聊天机器人，而是<span class="soft-highlight">开源AI智能体（Agent）</span>。如"贾维斯"般直接操作系统，执行各类任务。
        </p>
      </article>

      <article class="round-card">
        <div class="card-emoji-circle">⚡</div>
        <h2 class="card-heading">核心价值</h2>
        <p class="card-body-text">
          打破"只说不做"局限。<span class="soft-highlight">7x24小时数字员工</span>，极大提升效率，人人可用。
        </p>
      </article>

      <article class="round-card">
        <div class="card-emoji-circle">⚠️</div>
        <h2 class="card-heading">安全提醒</h2>
        <p class="card-body-text">
          高权限需注意<span class="soft-highlight">数据安全</span>，建议隔离环境部署。生产力革命才刚刚开始。
        </p>
      </article>
    </section>

    <div class="pastel-quote">
      <p class="quote-main-text">
        "真正能执行任务的AI" —— 这场生产力革命，或许才刚刚开始
      </p>
    </div>

    <footer>
      <a href="/" class="pill-button">✨ powered by 深表美文</a>
    </footer>
  </div>
</body>
</html>
