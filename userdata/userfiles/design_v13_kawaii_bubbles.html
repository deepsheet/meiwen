<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026爆火AI"小龙虾"：真正能干活的数字员工</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      color: #2d3436;
      line-height: 1.8;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 40px;
    }
    
    /* 可爱标题 */
    .cute-header {
      text-align: center;
      margin-bottom: 80px;
    }
    
    h1 {
      font-size: clamp(3em, 7vw, 5em);
      font-weight: 900;
      line-height: 1.2;
      color: #fd79a8;
      margin-bottom: 20px;
      text-shadow: 3px 3px 0px #fff, 6px 6px 0px rgba(253, 121, 168, 0.2);
    }
    
    .header-heart {
      font-size: 3em;
      animation: heartbeat 1.5s ease-in-out infinite;
      display: inline-block;
    }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    /* 气泡卡片 */
    .bubble-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 35px;
      margin-bottom: 80px;
    }
    
    .bubble-card {
      background: white;
      border-radius: 30px;
      padding: 40px;
      box-shadow: 
        0 10px 30px rgba(253, 121, 168, 0.2),
        inset 0 -5px 20px rgba(253, 121, 168, 0.1);
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      position: relative;
    }
    
    .bubble-card::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 5px 15px rgba(253, 121, 168, 0.2);
    }
    
    .bubble-card:hover {
      transform: translateY(-15px) scale(1.05);
      box-shadow: 
        0 20px 50px rgba(253, 121, 168, 0.3),
        inset 0 -5px 20px rgba(253, 121, 168, 0.15);
    }
    
    .card-cute-icon {
      font-size: 4em;
      margin-bottom: 20px;
      display: block;
      text-align: center;
      filter: drop-shadow(0 5px 10px rgba(253, 121, 168, 0.3));
    }
    
    .card-cute-title {
      font-size: 1.8em;
      font-weight: 900;
      margin-bottom: 18px;
      color: #fd79a8;
      text-align: center;
    }
    
    .card-cute-text {
      font-size: 1.1em;
      line-height: 2;
      color: #636e72;
      text-align: center;
    }
    
    .cute-highlight {
      background: linear-gradient(120deg, #ffeaa7 0%, #fab1a0 100%);
      padding: 3px 10px;
      border-radius: 10px;
      font-weight: 700;
      color: #d63031;
    }
    
    /* 引用框 */
    .quote-bubble {
      background: white;
      border-radius: 40px;
      padding: 60px;
      margin: 60px 0;
      text-align: center;
      box-shadow: 
        0 15px 40px rgba(253, 121, 168, 0.25),
        inset 0 -5px 20px rgba(253, 121, 168, 0.1);
      position: relative;
    }
    
    .quote-bubble::before {
      content: '💕';
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.5em;
    }
    
    .quote-cute-text {
      font-size: 2.2em;
      font-weight: 900;
      color: #fd79a8;
      line-height: 1.5;
    }
    
    /* 底部 */
    footer {
      text-align: center;
      margin-top: 80px;
    }
    
    .footer-cute-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 22px 55px;
      background: linear-gradient(135deg, #fd79a8, #e84393);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 900;
      font-size: 1.2em;
      box-shadow: 
        0 10px 30px rgba(253, 121, 168, 0.4),
        0 0 0 5px rgba(255, 255, 255, 0.5);
      transition: all 0.4s;
    }
    
    .footer-cute-btn:hover {
      transform: translateY(-10px) scale(1.08);
      box-shadow: 
        0 20px 50px rgba(253, 121, 168, 0.6),
        0 0 0 5px rgba(255, 255, 255, 0.7);
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .container {
        padding: 60px 25px;
      }
      
      .bubble-grid {
        grid-template-columns: 1fr;
      }
      
      .quote-bubble {
        padding: 50px 35px;
      }
      
      .quote-cute-text {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="cute-header">
      <h1>🦞 AI小龙虾</h1>
      <div class="header-heart">💖</div>
    </header>

    <section class="bubble-grid">
      <article class="bubble-card">
        <span class="card-cute-icon">🚀</span>
        <h2 class="card-cute-title">现象级爆火</h2>
        <p class="card-cute-text">
          2026年开春，<span class="cute-highlight">OpenClaw</span>彻底刷屏科技圈。从极客玩具到全民"养虾"热潮～
        </p>
      </article>

      <article class="bubble-card">
        <span class="card-cute-icon">🧠</span>
        <h2 class="card-cute-title">智能体本质</h2>
        <p class="card-cute-text">
          非聊天机器人，而是<span class="cute-highlight">开源AI智能体（Agent）</span>。如"贾维斯"般直接操作系统～
        </p>
      </article>

      <article class="bubble-card">
        <span class="card-cute-icon">⚡</span>
        <h2 class="card-cute-title">核心价值</h2>
        <p class="card-cute-text">
          打破"只说不做"局限。<span class="cute-highlight">7x24小时数字员工</span>，极大提升效率～
        </p>
      </article>

      <article class="bubble-card">
        <span class="card-cute-icon">⚠️</span>
        <h2 class="card-cute-title">安全提醒</h2>
        <p class="card-cute-text">
          高权限需注意<span class="cute-highlight">数据安全</span>，建议隔离环境部署哦～
        </p>
      </article>
    </section>

    <div class="quote-bubble">
      <p class="quote-cute-text">
        "真正能执行任务的AI" 💕
      </p>
    </div>

    <footer>
      <a href="/" class="footer-cute-btn">✨ powered by 深表美文</a>
    </footer>
  </div>
</body>
</html>
