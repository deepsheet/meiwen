<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI的影响</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      width: 90%;
      max-width: 800px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      padding: 30px;
      text-align: center;
    }
    h1 {
      font-size: 2.4rem;
      margin-bottom: 20px;
      color: #4a3aff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      letter-spacing: 1px;
    }
    .content {
      font-size: 1.15rem;
      line-height: 1.8;
      color: #333;
      text-align: left;
      margin-bottom: 20px;
      padding: 15px;
      background: #f9f9ff;
      border-radius: 12px;
      border-left: 4px solid #6a11cb;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin: 15px 0;
    }
    li {
      font-size: 1.1rem;
      margin: 12px 0;
      position: relative;
      padding-left: 30px;
      color: #4a3aff;
      font-weight: 500;
    }
    li::before {
      content: "🔹";
      position: absolute;
      left: 0;
      font-size: 1.3em;
    }
    .footer {
      margin-top: 40px;
      text-align: center;
    }
    .powered {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 50px;
      background: linear-gradient(90deg, #ff6b6b, #ffa500, #ffcc00, #4caf50);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }
    .powered:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="color: #4a3aff; font-size: 2.4rem; margin-bottom: 20px;">AI的影响 🤖🌍</h1>
    <div class="content">
      <p>人工智能正在改变世界。</p>
      <ul>
        <li>第一，AI提高了工作效率。</li>
        <li>第二，AI创造了新的就业机会。</li>
        <li>第三，AI推动了科技创新。</li>
      </ul>
    </div>
    <div class="footer">
      <a href="/" target="_blank" class="powered">✨ powered by 深表美文 ✨</a>
    </div>
  </div>
</body>
</html>
