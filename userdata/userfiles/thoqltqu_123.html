<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>123</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      line-height: 1.8;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 800px;
      width: 100%;
      margin: 20px auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    h1 {
      text-align: center;
      font-size: 2.8em;
      margin-bottom: 20px;
      color: #ffffff;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
      letter-spacing: 1px;
      font-weight: 700;
    }
    .content {
      font-size: 1.2em;
      color: #ffffff;
      text-align: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      margin-top: 20px;
      border: 1px dashed rgba(255, 255, 255, 0.3);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .emoji {
      font-size: 2em;
      margin: 0 5px;
    }
    .footer {
      margin-top: 50px;
      text-align: center;
    }
    .powered-by {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
      color: white;
      font-size: 1em;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .powered-by:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }
    .powered-by::before {
      content: "✨";
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="font-size: 3em; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.4);">123 🌟</h1>
    <div class="content">
      <p style="font-size: 1.4em; color: #fff; opacity: 0.9;">123</p>
    </div>
  </div>

  <div class="footer">
    <a href="/" target="_blank" class="powered-by" style="background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4); color: white; font-size: 1em; font-weight: 600; border-radius: 50px; padding: 12px 24px; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s ease; border: none; cursor: pointer;">
      ✨ powered by 深表美文
    </a>
  </div>
</body>
</html>
