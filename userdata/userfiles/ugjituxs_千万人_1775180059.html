<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千万人</title>
</head>
<body style="margin: 0; padding: 20px; font-family: PingFang SC, Microsoft YaHei, SimHei, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%); min-height: 100vh; color: #333; line-height: 1.6;">
    <div style="max-width: 900px; margin: 0 auto;">

        <!-- 主标题 -->
        <header style="text-align: center; margin-bottom: 60px; padding-top: 40px;">
            <h1 style="font-size: 3.5rem; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);">✨ 千万人</h1>
            <div style="height: 6px; width: 120px; background: linear-gradient(to right, #667eea, #764ba2); margin: 20px auto; border-radius: 3px;"></div>
        </header>

        <!-- 文章内容卡片 -->
        <main>
            <div style="background: white; border-radius: 24px; padding: 50px 40px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08); margin-bottom: 40px; position: relative; overflow: hidden;">
                <!-- 装饰性背景元素 -->
                <div style="position: absolute; top: -100px; right: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0) 70%); border-radius: 50%; z-index: 0;"></div>
                <div style="position: relative; z-index: 1;">

                    <!-- 核心内容展示 -->
                    <div style="text-align: center;">
                        <!-- 大型数字徽章 -->
                        <div style="display: inline-flex; align-items: center; justify-content: center; width: 180px; height: 180px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; margin-bottom: 40px; box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3);">
                            <span style="font-size: 4.5rem; font-weight: 800; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.2);">千</span>
                        </div>
                        <div style="display: inline-flex; align-items: center; justify-content: center; width: 180px; height: 180px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 50%; margin-bottom: 40px; margin-left: 30px; box-shadow: 0 15px 35px rgba(240, 147, 251, 0.3);">
                            <span style="font-size: 4.5rem; font-weight: 800; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.2);">万</span>
                        </div>
                        <div style="display: inline-flex; align-items: center; justify-content: center; width: 180px; height: 180px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border-radius: 50%; margin-bottom: 40px; margin-left: 30px; box-shadow: 0 15px 35px rgba(79, 172, 254, 0.3);">
                            <span style="font-size: 4.5rem; font-weight: 800; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.2);">人</span>
                        </div>

                        <!-- 文字内容 -->
                        <div style="margin-top: 50px;">
                            <p style="font-size: 2.8rem; font-weight: 300; color: #444; margin: 0; line-height: 1.3; letter-spacing: 2px;">
                                千万人
                            </p>
                            <div style="margin-top: 30px; padding: 25px; background: linear-gradient(90deg, #f8f9fa, #e9ecef); border-radius: 16px; border-left: 6px solid #667eea;">
                                <p style="font-size: 1.2rem; color: #666; margin: 0; font-style: italic;">
                                    —— 三个字，一个世界。
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- 标签云 -->
                    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 60px;">
                        <span style="padding: 10px 22px; background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); border-radius: 50px; font-size: 1rem; font-weight: 600; color: #555; box-shadow: 0 4px 12px rgba(168, 237, 234, 0.3);">宏大叙事</span>
                        <span style="padding: 10px 22px; background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%); border-radius: 50px; font-size: 1rem; font-weight: 600; color: #555; box-shadow: 0 4px 12px rgba(210, 153, 194, 0.3);">个体集合</span>
                        <span style="padding: 10px 22px; background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); border-radius: 50px; font-size: 1rem; font-weight: 600; color: #555; box-shadow: 0 4px 12px rgba(137, 247, 254, 0.3);">无限可能</span>
                        <span style="padding: 10px 22px; background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); border-radius: 50px; font-size: 1rem; font-weight: 600; color: #555; box-shadow: 0 4px 12px rgba(246, 211, 101, 0.3);">时代洪流</span>
                    </div>

                </div>
            </div>

            <!-- 概念阐释卡片 -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-bottom: 40px;">
                <div style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); text-align: center; border-top: 8px solid #667eea;">
                    <div style="font-size: 3rem; margin-bottom: 15px;">👥</div>
                    <h3 style="margin-top: 0; margin-bottom: 15px; color: #444; font-size: 1.5rem;">量级</h3>
                    <p style="color: #666; margin: 0; font-size: 1.05rem;">
                        一个庞大的数字，代表着规模、声势与力量。
                    </p>
                </div>
                <div style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); text-align: center; border-top: 8px solid #f093fb;">
                    <div style="font-size: 3rem; margin-bottom: 15px;">🎭</div>
                    <h3 style="margin-top: 0; margin-bottom: 15px; color: #444; font-size: 1.5rem;">众生</h3>
                    <p style="color: #666; margin: 0; font-size: 1.05rem;">
                        每一个“一”的集合，是无数个体命运的交织与共鸣。
                    </p>
                </div>
                <div style="background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); text-align: center; border-top: 8px solid #4facfe;">
                    <div style="font-size: 3rem; margin-bottom: 15px;">🚶‍♂️</div>
                    <h3 style="margin-top: 0; margin-bottom: 15px; color: #444; font-size: 1.5rem;">前行</h3>
                    <p style="color: #666; margin: 0; font-size: 1.05rem;">
                        一种状态，一种方向，一种共同奔赴的未知与未来。
                    </p>
                </div>
            </div>

        </main>

        <!-- 页面底部标识 - 固定模板 -->
        <div style="text-align: center; margin-top: 60px; padding: 30px 0; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); border-radius: 16px;">
            <a href="http://localhost:8009/beauty_html" target="_blank" style="text-decoration: none; color: #667eea; font-size: 16px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease;" onmouseover="this.style.color='#764ba2'; this.style.transform='scale(1.05)'" onmouseout="this.style.color='#667eea'; this.style.transform='scale(1)'">
                🎨 <span>powered by 深表美文</span>
            </a>
        </div>

    </div>
</body>
</html>
