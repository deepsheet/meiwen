<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>234</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
      line-height: 1.8;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .header {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(120deg, #6a11cb 0%, #2575fc 100%);
      color: white;
      border-bottom: 3px solid #fff;
    }
    .header h1 {
      font-size: 2.8em;
      margin: 0;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .content {
      padding: 40px 30px;
      text-align: center;
      font-size: 2.2em;
      font-weight: 900;
      color: #4a5568;
      letter-spacing: 3px;
      background: linear-gradient(to right, #f8f9fa, #e9ecef);
      border-radius: 0 0 16px 16px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .emoji {
      font-size: 3em;
      margin-bottom: 10px;
    }
    .footer {
      text-align: center;
      padding: 20px;
      background: #f1f3f5;
      border-top: 1px solid #ddd;
    }
    .powered-link {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(90deg, #6a11cb, #2575fc, #1890ff);
      color: white;
      text-decoration: none;
      font-size: 1em;
      font-weight: 600;
      border-radius: 50px;
      box-shadow: 0 4px 12px rgba(106, 17, 203, 0.3);
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }
    .powered-link:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 20px rgba(106, 17, 203, 0.4);
    }
    .powered-link::before {
      content: "✨";
      margin-right: 8px;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>234</h1>
    </div>
    <div class="content">
      <div class="emoji">🔢</div>
      <p>234</p>
    </div>
  </div>
  <div class="footer">
    <a href="/" target="_blank" class="powered-link">powered by 深表美文</a>
  </div>
</body>
</html>
