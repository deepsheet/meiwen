<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>123</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
      line-height: 1.6;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .content-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 40px;
      margin-bottom: 30px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .content-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    }
    p {
      font-size: 1.1rem;
      color: #444;
      text-align: center;
      margin-bottom: 20px;
      padding: 10px;
      background-color: #f9f9f9;
      border-left: 4px solid #6a11cb;
      border-radius: 0 8px 8px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .emoji {
      font-size: 1.5em;
    }
    .footer {
      margin-top: auto;
      text-align: center;
      padding: 30px 0;
    }
    .powered-by {
      display: inline-block;
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }
    .powered-by:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(106, 17, 203, 0.4);
    }
    .powered-by::before {
      content: "✨";
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="font-size: 2.8rem; text-align: center; margin-bottom: 30px; background: linear-gradient(90deg, #6a11cb, #2575fc); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 700; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,0.1);">123</h1>

    <div class="content-card" style="background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 40px; margin-bottom: 30px; transition: transform 0.3s ease, box-shadow 0.3s ease;">
      <p style="font-size: 1.1rem; color: #444; text-align: center; margin-bottom: 20px; padding: 10px; background-color: #f9f9f9; border-left: 4px solid #6a11cb; border-radius: 0 8px 8px 0; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span class="emoji" style="font-size: 1.5em;">🔢</span>
        <span>123</span>
      </p>
    </div>

    <div class="footer" style="margin-top: auto; text-align: center; padding: 30px 0;">
      <a href="/" target="_blank" class="powered-by" style="display: inline-block; background: linear-gradient(90deg, #6a11cb, #2575fc); color: white; padding: 12px 24px; border-radius: 50px; font-size: 1rem; font-weight: 600; text-decoration: none; box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3); transition: all 0.3s ease; border: none; cursor: pointer; letter-spacing: 0.5px; position: relative; overflow: hidden;">
        ✨ 
    <!-- 下载按钮 -->
    <div style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
        <button id="downloadBtn" onclick="downloadCurrentPage()" title="下载本网页到本地" style="background: rgba(102, 126, 234, 0.8); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15); transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 6px; backdrop-filter: blur(10px);" onmouseover="this.style.background='rgba(102, 126, 234, 1)'; this.style.transform='translateY(-1px)'" onmouseout="this.style.background='rgba(102, 126, 234, 0.8)'; this.style.transform='translateY(0)'">
            📥 下载
        </button>
    </div>
    
    <script>
        function downloadCurrentPage() {
            // 获取当前页面的完整 HTML
            const htmlContent = document.documentElement.outerHTML;
            
            // 移除下载按钮元素
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.parentElement.remove();
            }
            
            // 创建一个 Blob 对象
            const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html;charset=utf-8' });
            
            // 创建下载链接
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            // 生成文件名（使用页面标题）
            const title = document.title || 'page';
            const filename = title.replace(/[^\w一-鿿]/g, '_') + '.html';
            a.download = filename;
            
            // 触发下载
            document.body.appendChild(a);
            a.click();
            
            // 清理
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }
    </script>

      </a>
    </div>
  </div>
</body>
</html>
