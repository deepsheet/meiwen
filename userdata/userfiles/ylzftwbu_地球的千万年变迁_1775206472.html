    <!-- 主标题卡片 -->
    <div style="max-width: 800px; margin: 40px auto; background: linear-gradient(90deg, #2b5876 0%, #4e4376 100%); color: white; padding: 40px 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(41, 87, 118, 0.2); text-align: center; border: 1px solid rgba(255,255,255,0.1);">

    <div style="max-width: 760px; margin: 0 auto;">

        <div style="background: white; padding: 60px 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); margin-bottom: 40px; border: 1px solid #f0f0f0; text-align: center; position: relative; overflow: hidden;">

            <p style="margin: 0; line-height: 1.7; color: #444; font-size: 1.05rem;">
                <strong>“千万年”</strong> 是一个复合时间单位，指代一千万年的时光跨度。在地球科学中，这个尺度常用于描述大陆漂移、山脉隆起、气候周期等宏观地质变化。它超越了人类文明的历史，将我们的视角引向星球本身的漫长叙事。
            </p>

                <div style="margin: 0 30px; text-align: center;"><strong>一万年</strong><br>人类文明</div>
                <div style="margin: 0 30px; text-align: center;"><strong>一百年</strong><br>个人生命</div>
            </div>
            <p style="font-size: 0.95rem; color: #777; margin-top: 25px; font-style: italic;">
                在“千万年”的标尺下，我们得以窥见地球作为一颗动态星球的宏伟史诗。
            </p>
