<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>123</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
      line-height: 1.8;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    h1 {
      text-align: center;
      font-size: 2.8em;
      margin-bottom: 20px;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .content {
      font-size: 1.2em;
      color: #444;
      text-align: center;
      padding: 40px 20px;
      border-radius: 15px;
      background: linear-gradient(145deg, #f9f9f9, #eef1f5);
      border: 1px solid #dcdcdc;
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      animation: fadeIn 1.2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .emoji {
      font-size: 2.5em;
      margin-right: 10px;
    }
    .footer {
      text-align: center;
      margin-top: 60px;
      padding: 20px;
    }
    .powered {
      display: inline-block;
      font-size: 1em;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, #6a11cb, #2575fc, #00c8ff);
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
      transition: all 0.4s ease;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      border: none;
      cursor: pointer;
    }
    .powered:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 25px rgba(106, 17, 203, 0.5);
    }
    .powered::before {
      content: "✨";
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>123</h1>
    <div class="content">
      <span class="emoji">📌</span>
      <span>123</span>
    </div>
  </div>

  <div class="footer">
    <a href="/" target="_blank" class="powered">
    <!-- 下载按钮 -->
    <div style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
        <button id="downloadBtn" onclick="downloadCurrentPage()" title="下载本网页到本地" style="background: rgba(102, 126, 234, 0.8); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15); transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 6px; backdrop-filter: blur(10px);" onmouseover="this.style.background='rgba(102, 126, 234, 1)'; this.style.transform='translateY(-1px)'" onmouseout="this.style.background='rgba(102, 126, 234, 0.8)'; this.style.transform='translateY(0)'">
            📥 下载
        </button>
    </div>
    
    <script>
        function downloadCurrentPage() {
            // 获取当前页面的完整 HTML
            const htmlContent = document.documentElement.outerHTML;
            
            // 移除下载按钮元素
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.parentElement.remove();
            }
            
            // 创建一个 Blob 对象
            const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html;charset=utf-8' });
            
            // 创建下载链接
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            // 生成文件名（使用页面标题）
            const title = document.title || 'page';
            const filename = title.replace(/[^\w一-鿿]/g, '_') + '.html';
            a.download = filename;
            
            // 触发下载
            document.body.appendChild(a);
            a.click();
            
            // 清理
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }
    </script>

深表美文-文本转美页面</a>
  </div>
</body>
</html>
