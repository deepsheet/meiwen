<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>12345便民服务热线解析</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      padding: 30px;
      text-align: center;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      color: #5a319b;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      letter-spacing: 1px;
    }
    .content {
      font-size: 1.4em;
      line-height: 1.8;
      color: #444;
      margin: 20px 0;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 15px;
      border: 1px dashed #d1c4e9;
      display: inline-block;
      min-height: 60px;
      width: 100%;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .emoji {
      font-size: 2em;
      margin-right: 8px;
    }
    .footer {
      margin-top: 40px;
      text-align: center;
    }
    .powered {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(90deg, #667eea, #764ba2, #5a319b);
      color: white;
      font-size: 1em;
      font-weight: 600;
      border-radius: 25px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .powered:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }
    .powered::before {
      content: "✨";
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="emoji">📞</span> 12345便民服务热线解析</h1>
    <div class="content">12345</div>
    <div class="footer">
      <a href="/" class="powered">powered by 深表美文</a>
    </div>
  </div>
</body>
</html>
