<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="icon" href="/favicon.ico?v=2" type="image/x-icon">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>123</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
      line-height: 1.8;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      width: 100%;
      background: white;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      padding: 40px;
      text-align: center;
    }
    h1 {
      font-size: 2.8rem;
      margin-bottom: 20px;
      color: #2c3e50;
      background: linear-gradient(90deg, #6a11cb, #b721ff, #c346c1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .content {
      font-size: 1.4rem;
      color: #2c3e50;
      margin: 30px 0;
      padding: 20px;
      background: #f8f9ff;
      border-radius: 15px;
      border-left: 5px solid #6a11cb;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.05);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 120px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .emoji {
      font-size: 2rem;
      margin-right: 10px;
    }
    .footer {
      margin-top: 60px;
      text-align: center;
    }
    .powered {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(90deg, #6a11cb, #b721ff, #c346c1);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 30px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
      font-family: 'Segoe UI', sans-serif;
    }
    .powered:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(106, 17, 203, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>123</h1>
    <div class="content">
      <span class="emoji">🔢</span>123
    </div>
  </div>
  <div class="footer">
    <a href="/" target="_blank" class="powered">✨ powered by 深表美文</a>
  </div>
</body>
</html>
